services:
  mail-tailscale-sidecar:
    image: tailscale/tailscale:latest
    hostname: mail
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:mail-container
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    networks:
      - localhost
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  mail-server:
    build: ./mail-server
    environment:
      HOST: ${HOST}
      PORT: ${PORT}
      DATA_DIR: ${DATA_DIR}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
    volumes:
      - mail_data:${DATA_DIR}
    network_mode: service:mail-tailscale-sidecar
    depends_on:
      - mail-tailscale-sidecar
    restart: unless-stopped

networks:
  localhost:
    name: localbridge
    external: true

volumes:
  mail_data:
    driver: local
  tailscale_data:
    driver: local

services:
  workspace-tailscale-sidecar:
    image: tailscale/tailscale:latest
    hostname: workspace
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:workspace-container
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    networks:
      - localhost
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  syncthing-sidecar:
    image: syncthing/syncthing:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=Etc/UTC
    volumes:
      - workspace_data:/var/syncthing
    cap_add:
      - SYS_ADMIN
    network_mode: service:workspace-tailscale-sidecar # all networking through tailscale
    depends_on:
      - workspace-tailscale-sidecar
    healthcheck:
      test: curl -fkLsS -m 2 127.0.0.1:8384/rest/noauth/health | grep -o --color=never OK || exit 1
      interval: 10m
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  
  workspace:
    build:
      context: .
      args:
        - DOCKER_GID=${DOCKER_GID}
        - WORKSPACE_UID=${UID}
        - WORKSPACE_GID=${GID}
        - WORKSPACE_USER=${WORKSPACE_USER}
        - WORKSPACE_PASSWORD=${WORKSPACE_PASSWORD}
    container_name: workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.ssh:/home/${WORKSPACE_USER}/.ssh
      - ./.config:/home/${WORKSPACE_USER}/.config
      - workspace_data:/home/${WORKSPACE_USER}/dev
    network_mode: service:workspace-tailscale-sidecar
    depends_on:
      - syncthing-sidecar
    restart: unless-stopped

networks:
  localhost:
    name: localbridge
    external: true
  
volumes:
  tailscale_data:
    driver: local
  workspace_data:
    driver: local
